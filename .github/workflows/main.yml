name: CI and Deploy

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 20m
          script: |
            set -e
            git config --global --add safe.directory /srv/personal-website-rust
            cd /srv/personal-website-rust
            git fetch origin main
            git checkout main
            git clean -f -- mailserver-config/
            git pull --ff-only origin main
            bash scripts/init-env.sh
            docker compose up -d --build
            docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || true
            docker compose restart mailserver
