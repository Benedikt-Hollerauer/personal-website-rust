services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      LOCO_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: mailserver
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
      APP_HOST: ${APP_HOST}
    volumes:
      - uploads:/usr/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY}
        VITE_LINK_GITHUB: ${VITE_LINK_GITHUB}
        VITE_LINK_INSTAGRAM: ${VITE_LINK_INSTAGRAM}
        VITE_LINK_LINKEDIN: ${VITE_LINK_LINKEDIN}
        VITE_LINK_LINKEDIN_SKILLS: ${VITE_LINK_LINKEDIN_SKILLS}
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    hostname: mail.benedikt-hollerauer.com
    restart: unless-stopped
    stop_grace_period: 1m
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "993:993"
    volumes:
      - mail_data:/var/mail
      - mail_state:/var/mail-state
      - mail_log:/var/log/mail
      - ./mailserver-config:/tmp/docker-mailserver
      - caddy_data:/caddy-data:ro
    environment:
      ENABLE_RSPAMD: "1"
      ENABLE_CLAMAV: "0"
      ENABLE_FAIL2BAN: "0"
      PERMIT_DOCKER: network
      SSL_TYPE: manual
      SSL_CERT_PATH: /caddy-data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/mail.benedikt-hollerauer.com/mail.benedikt-hollerauer.com.crt
      SSL_KEY_PATH: /caddy-data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/mail.benedikt-hollerauer.com/mail.benedikt-hollerauer.com.key
    networks:
      default:
        aliases:
          - mail.benedikt-hollerauer.com
    depends_on:
      - caddy

volumes:
  postgres_data:
  uploads:
  caddy_data:
  caddy_config:
  mail_data:
  mail_state:
  mail_log:
